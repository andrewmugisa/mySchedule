services:
  db:
    image: postgres:16
    container_name: pats_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pats
      POSTGRES_USER: pats_user
      POSTGRES_PASSWORD: pats_pass_change_me
    volumes:
      - pats_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5434:5432"
    networks:
      - pats_default

  backend:
    build: ./backend
    container_name: pats_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://pats_user:pats_pass_change_me@db:5432/pats
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - db
    networks:
      - pats_default

  frontend:
    build: ./frontend
    container_name: pats_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:5174:5174"
    networks:
      - pats_default

volumes:
  pats_pgdata:

networks:
  pats_default:
    driver: bridge
